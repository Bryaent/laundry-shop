<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laundry Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- HEADER -->
<header id="adminHeader">
  <div class="header-left">
    <div id="Lugu">
      <img src="img/Logo.png" alt="Logo"/>
    </div>
    <h1>Admin Dashboard</h1>
  </div>

  <div class="header-right">
    <button class="btn logout" onclick="logout()">Logout</button>
  </div>
</header>

<main>

  <!-- SEARCH + FILTER -->
  <div class="top-controls">
    <input type="text" id="searchInput" placeholder="Search name or contact...">
    
    <select id="statusFilter">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="inprogress">In Progress</option>
      <option value="completed">Completed</option>
    </select>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button id="liveTab" class="tab active">Live Orders</button>
    <button id="historyTab" class="tab">Order History</button>
  </div>

  <!-- LIVE -->
  <section id="liveOrders">
    <div class="card">
      <table id="ordersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Service</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- HISTORY -->
  <section id="orderHistory" style="display:none;">
    <div class="card">
      <table id="historyTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Service</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

</main>

<script src="admin.js"></script>
</body>
</html>
